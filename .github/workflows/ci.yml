name: CI - Build Check

on:
  push:
      branches: [main]
        pull_request:
            branches: [main]

            jobs:
              frontend-build:
                  name: Frontend TypeScript Build
                      runs-on: ubuntu-latest
                          steps:
                                - uses: actions/checkout@v4

                                      - name: Setup Node.js
                                              uses: actions/setup-node@v4
                                                      with:
                                                                node-version: '20'
                                                                          cache: 'npm'
                                                                                    cache-dependency-path: frontend/package-lock.json

                                                                                          - name: Install dependencies
                                                                                                  working-directory: frontend
                                                                                                          run: npm ci
                                                                                                          
                                                                                                                - name: TypeScript check + Vite build
                                                                                                                        working-directory: frontend
                                                                                                                                run: npm run build
                                                                                                                                
                                                                                                                                  backend-check:
                                                                                                                                      name: Backend Python Syntax Check
                                                                                                                                          runs-on: ubuntu-latest
                                                                                                                                              steps:
                                                                                                                                                    - uses: actions/checkout@v4
                                                                                                                                                    
                                                                                                                                                          - name: Setup Python
                                                                                                                                                                  uses: actions/setup-python@v5
                                                                                                                                                                          with:
                                                                                                                                                                                    python-version: '3.11'
                                                                                                                                                                                    
                                                                                                                                                                                          - name: Install dependencies
                                                                                                                                                                                                  working-directory: backend
                                                                                                                                                                                                          run: pip install -r requirements.txt
                                                                                                                                                                                                          
                                                                                                                                                                                                                - name: Check Python syntax
                                                                                                                                                                                                                        working-directory: backend
                                                                                                                                                                                                                                run: python -m py_compile app/main.py app/core/config.py app/core/database.py app/api/routes/chat.py app/api/routes/procedures.py
                                                                                                                                                                                                                                        env:
                                                                                                                                                                                                                                                  DATABASE_URL: postgresql+psycopg2://test:test@localhost/test
