services:
  db:
    image: postgres:15-alpine
    container_name: jurist_db_dev
    restart: unless-stopped
    # host network = PostgreSQL accessible directly via 127.0.0.1:5432
    # Works in Codespaces where bridge port-mapping is blocked
    network_mode: host
    environment:
      POSTGRES_USER: jurist
      POSTGRES_PASSWORD: jurist
      POSTGRES_DB: jurist
      PGDATA: /var/lib/postgresql/data
    volumes:
      # Bind-mount to workspace dir → data survives Codespace stop/start
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jurist -d jurist"]
      interval: 5s
      timeout: 5s
      retries: 12
