version: '3.9'

# Minimal dev compose: only the database
# Run with: docker compose -f docker-compose.dev.yml up -d db
# Then use start.sh to run backend and frontend locally.
services:
  db:
    image: postgres:15-alpine
    container_name: jurist_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: jurist
      POSTGRES_PASSWORD: jurist
      POSTGRES_DB: jurist
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jurist -d jurist"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
